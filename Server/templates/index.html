<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CSV Viewer{% if selected_file %} — {{ selected_file }}{% endif %}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>CSV データビューア</h1>
    </div>
  </header>

  {% if csv_files %}
  <nav>
    <ul class="file-list">
      {% for file in csv_files %}
        <li>
          <a href="/?file={{ file }}" class="{% if file == selected_file %}active{% endif %}">
            {{ file }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </nav>
  {% endif %}

  {% if error %}
    <div class="error-msg"><strong>エラー:</strong> {{ error }}</div>
  {% endif %}

  <div class="actions">
    <button
      id="open-add-dialog"
      class="button-primary"
      type="button"
      aria-haspopup="dialog"
      aria-controls="add-data-dialog"
      {% if not client_ids %}disabled title="追加先のclient-idがCSVにありません"{% endif %}
    >
      <span aria-hidden="true">＋</span>
      データ追加
    </button>
    <button id="download">CSVをエクスポート</button>
    <button id="export-json">JSONをエクスポート</button>
  </div>
<div class="panel">
    <div class="toolbar">
      <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; font-family: 'Inter', sans-serif; width: 100%;">
        
        <div style="flex: 1; min-width: 150px; background-color: #eff6ff; border-left: 4px solid #2563eb; padding: 12px 15px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
          <div style="font-size: 0.85em; color: #1e40af; margin-bottom: 4px; font-weight: 600;">平均温度</div>
          <div style="font-size: 1.4em; font-weight: bold; color: #1d4ed8;">{{ avg_temperature }} <span style="font-size: 0.7em;">℃</span></div>
        </div>

        <div style="flex: 1; min-width: 150px; background-color: #ecfdf5; border-left: 4px solid #10b981; padding: 12px 15px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
          <div style="font-size: 0.85em; color: #065f46; margin-bottom: 4px; font-weight: 600;">平均湿度</div>
          <div style="font-size: 1.4em; font-weight: bold; color: #047857;">{{ avg_humidity }} <span style="font-size: 0.7em;">%</span></div>
        </div>

        <div style="flex: 1; min-width: 150px; background-color: #fef3c7; border-left: 4px solid #d97706; padding: 12px 15px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
          <div style="font-size: 0.85em; color: #92400e; margin-bottom: 4px; font-weight: 600;">平均降水量</div>
          <div style="font-size: 1.4em; font-weight: bold; color: #b45309;">未取得</div>
        </div>

        <div style="flex: 1; min-width: 150px; background-color: #faf5ff; border-left: 4px solid #8b5cf6; padding: 12px 15px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
          <div style="font-size: 0.85em; color: #5b21b6; margin-bottom: 4px; font-weight: 600;">平均光量</div>
          <div style="font-size: 1.4em; font-weight: bold; color: #6d28d9;">未取得</div>
        </div>

      </div>
      <div class="stats" id="stats"></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr id="table-header"></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <dialog id="add-data-dialog" class="data-dialog" aria-labelledby="add-data-title">
    <form id="add-data-form">
      <div class="dialog-heading">
        <div class="dialog-heading-copy">
          <span class="dialog-kicker">CSV RECORD</span>
          <h2 id="add-data-title">センサーデータを追加</h2>
          <p>選択中のCSVへ、計測時刻に沿って1件追加します。</p>
        </div>
        <div class="time-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="form-grid">
        <label class="field field-wide">
          <span>client-id</span>
          <select id="client-id" name="client_id" required>
            <option value="">client-idを選択</option>
            {% for client_id in client_ids %}
              <option value="{{ client_id }}">{{ client_id }}</option>
            {% endfor %}
          </select>
          {% if client_id_column == "id" %}
            <small>このCSVでは「id」列をclient-idとして使用します。</small>
          {% endif %}
        </label>

        <label class="field field-wide">
          <span>timestamp</span>
          <input id="timestamp" name="timestamp" type="datetime-local" step="1" required>
          <small>日付と時刻を秒単位で指定してください。</small>
        </label>

        <label class="field">
          <span>temp <small>℃</small></span>
          <input name="temp" type="number" step="0.1" inputmode="decimal" placeholder="例: 24.8" required>
        </label>

        <label class="field">
          <span>humid <small>%</small></span>
          <input name="humid" type="number" min="0" max="100" step="0.1" inputmode="decimal" placeholder="例: 60.2" required>
        </label>

        <label class="field">
          <span>co2 <small>ppm</small></span>
          <input name="co2" type="number" min="0" step="1" inputmode="numeric" placeholder="例: 800" required>
        </label>

        <label class="field">
          <span>light_percent <small>%</small></span>
          <input name="light_percent" type="number" min="0" max="100" step="0.1" inputmode="decimal" placeholder="例: 48.5" required>
        </label>
      </div>

      <p id="add-data-error" class="form-error" role="alert" aria-live="polite"></p>

      <div class="dialog-actions">
        <button id="cancel-add-data" type="button">キャンセル</button>
        <button id="submit-add-data" class="button-primary" type="submit">
          データを追加
        </button>
      </div>
    </form>
  </dialog>

<script>
  window.CSV_COLUMNS = {{ columns|tojson }};
  window.CSV_ROWS = {{ rows|tojson }};
  window.SELECTED_FILE = {{ selected_file|tojson }};
</script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
