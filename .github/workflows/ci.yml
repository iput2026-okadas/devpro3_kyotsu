name: CI

# メインブランチへの push（直接 push とマージ結果の両方）をフックに実行する。
on:
  push:
    branches:
      - main

# 同一ブランチで新しい push があれば実行中のワークフローをキャンセルする。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # unittest による単体テスト（alert / server / app）。
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r tests/requirements.txt

      # リポジトリ直下で実行し、`from Server import ...` を解決できるようにする。
      - name: Run unit tests
        run: python -m unittest discover -s tests/unit -p "test_*.py" -v

  # Playwright による CSV ビューアの E2E（結合）テスト。
  e2e-test:
    name: E2E Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r tests/requirements.txt

      # Chromium とその実行に必要な OS 依存パッケージを導入する。
      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run e2e tests
        run: python -m pytest tests/e2e -v
