<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CSV Viewer{% if selected_file %} — {{ selected_file }}{% endif %}</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>CSV データビューア</h1>
    </div>
  </header>

  {% if csv_files %}
  <nav>
    <ul class="file-list">
      {% for file in csv_files %}
        <li>
          <a href="/?file={{ file }}" class="{% if file == selected_file %}active{% endif %}">
            {{ file }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </nav>
  {% endif %}

  {% if error %}
    <div class="error-msg"><strong>エラー:</strong> {{ error }}</div>
  {% endif %}

  <div class="actions">
    <button id="download">CSVをエクスポート</button>
    <button id="export-json">JSONをエクスポート</button>
  </div>

  <div class="panel">
    <div class="toolbar">
      <div class="stats" id="stats"></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr id="table-header"></tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  window.CSV_COLUMNS = {{ columns|tojson }};
  window.CSV_ROWS = {{ rows|tojson }};
  window.SELECTED_FILE = {{ selected_file|tojson }};
</script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
